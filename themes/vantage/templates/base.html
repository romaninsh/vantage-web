<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}{{ config.title }}{% endblock title %}</title>
        {% if page and page.description %}<meta name="description" content="{{ page.description }}">
        {% elif section and section.description %}<meta name="description" content="{{ section.description }}">{% endif %}

        <!-- Google Fonts: Inter (UI) + JetBrains Mono (code, kickers) -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

        <!-- Material Symbols Icons -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

        <!-- Tailwind-compiled stylesheet -->
        <link rel="stylesheet" href="{{ get_url(path='main.css') }}">

        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="{{ get_url(path='favicon.svg') }}">
    </head>

    <body class="{% block body_class %}{% endblock body_class %}">
        {% block content %}
        {% endblock content %}

        <!-- Lightbox overlay (populated by site.js when a .shot-thumb is clicked) -->
        <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Screenshot">
            <button type="button" class="lightbox-close" aria-label="Close">
                <span class="material-symbols-outlined">close</span>
            </button>
            <figure class="lightbox-figure">
                <img class="lightbox-img" src="" alt="">
                <figcaption class="lightbox-caption"></figcaption>
            </figure>
        </div>

        <!-- Prism.js syntax highlighting (client-side; grammars loaded explicitly) -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js" integrity="sha512-9khQRAUBYEJDCDVP2yw3LRUQvjJ0Pjx0EShmaQjcHa6AXiOv6qHQu9lCAIR8O+/D8FtaCoJ2c0Tf9Xo7hYH01Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js" integrity="sha512-/Rynaa6ehLZJO9fdk+EUsgiOdJqFSFUB4Qgy+gP4vU4U1DrmPJWypfXe1CgyaV7rRdZjGxdpLe9djxhx1ZHvqQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js" integrity="sha512-R/HpMlNfZZV6DxMhNz1dYJbBaPBVSOCqX8imo3uGUurhPDHRcXrBxkEVOjawwUwTMfOqT6t1eLYYQXIjFWCX/A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js" integrity="sha512-6O/PZimM3TD1NN3yrazePA4AbZrPcwt1QCGJrVY7WoHDJROZFc9TlBvIKMe+QfqgcslW4lQeBzNJEJvIMC8WhA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js" integrity="sha512-whYhDwtTmlC/NpZlCr6PSsAaLOrfjVg/iXAnC4H/dtiHawpShhT2SlIMbpIhT/IL/NrpdMm+Hq2C13+VKpHTYw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <!-- Site behaviour: nav, tabs, galleries -->
        <script src="{{ get_url(path='js/site.js') }}" defer></script>
    </body>
</html>
