name: Deploy to S3

# Build the Zola site and sync it to the marketing-site bucket
# (vantage-ui.com). Auth is via GitHub OIDC into the
# vantage-demo-release-uploader role (see vantage-terraform); no
# long-lived AWS keys. The role's `site_deployer` policy is scoped to
# this bucket only.
#
# Kept named `deploy.yml` because vantage-ui's nightly workflow fires
# `gh workflow run deploy.yml --repo romaninsh/vantage-web` to refresh
# the baked-in nightly manifest after a new build.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for AWS

concurrency:
  group: "site-deploy"
  cancel-in-progress: true

env:
  # Keep in sync with the locally installed tailwindcss (brew install tailwindcss)
  TAILWIND_VERSION: 4.3.0
  AWS_REGION: eu-west-2
  AWS_ROLE_ARN: arn:aws:iam::578465001751:role/vantage-demo-release-uploader
  SITE_BUCKET: vantage-ui.com
  CF_DISTRIBUTION_ID: E18KQTM4QLF7KJ

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.21.0

      - name: Install Tailwind CSS standalone CLI
        run: |
          curl -sL -o /usr/local/bin/tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64"
          chmod +x /usr/local/bin/tailwindcss
          tailwindcss --help | head -1

      - name: Build CSS with Tailwind
        run: tailwindcss -i css/main.css -o static/main.css --minify

      - name: Build with Zola
        run: zola build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync public/ "s3://${SITE_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${CF_DISTRIBUTION_ID}" --paths "/*"
